<!DOCTYPE html>
<html>
<head>
  <title>Campus Events App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    #events {
      max-width: 700px;
      margin: auto;
    }

    .event {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .type {
      color: #666;
      margin-top: 4px;
    }

    .details {
      margin-top: 8px;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      background-color: #0077cc;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005fa3;
    }
  </style>
</head>

<body>

<h1>Campus Events</h1>

<div id="events"></div>

<script>
async function loadEvents() {
  const response = await fetch('/api/events');
  const events = await response.json();

  const container = document.getElementById('events');
  container.innerHTML = '';

  events.forEach(event => {
    const div = document.createElement('div');
    div.className = 'event';

    div.innerHTML = `
      <div class="title">${event.title}</div>
      <div class="type">Type: ${event.type_name}</div>
      <div class="details">
        Location: ${event.location}<br>
        Date: ${new Date(event.event_date).toLocaleString()}
      </div>
      <button onclick="register(${event.event_id})">Register</button>
    `;

    container.appendChild(div);
  });
}

async function register(eventId) {
  await fetch('/api/register', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      user_id: 1,
      event_id: eventId
    })
  });

  alert('Registered successfully!');
}

loadEvents();
</script>

</body>
</html>
