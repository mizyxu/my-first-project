<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Dark theme (default) ── */
    :root, [data-theme="dark"] {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --card:      #161d2e;
      --border:    #1f2d45;
      --violet:    #7c5cfc;
      --violet-lt: #9d82fd;
      --teal:      #2dd4bf;
      --rose:      #f472b6;
      --amber:     #fbbf24;
      --text:      #f0f4ff;
      --muted:     #6b7fa3;
      --soft:      #a8b8d8;
      --glow:      rgba(124,92,252,0.18);
      --header-bg: rgba(10,14,26,0.85);
      --hover-row: rgba(124,92,252,0.05);
      --tag-bg:    rgba(124,92,252,0.15);
      --tag-color: var(--violet-lt);
      --tag-border:rgba(124,92,252,0.25);
      --pill-bg:   rgba(45,212,191,0.12);
      --pill-color:var(--teal);
      --pill-border:rgba(45,212,191,0.25);
      --toggle-icon: "☀️";
    }

    /* ── Light theme ── */
    [data-theme="light"] {
      --bg:        #f4f6fb;
      --surface:   #ffffff;
      --card:      #ffffff;
      --border:    #e2e8f4;
      --violet:    #6246ea;
      --violet-lt: #7c5cfc;
      --teal:      #0d9488;
      --rose:      #db2777;
      --amber:     #d97706;
      --text:      #0f172a;
      --muted:     #64748b;
      --soft:      #475569;
      --glow:      rgba(98,70,234,0.08);
      --header-bg: rgba(244,246,251,0.9);
      --hover-row: rgba(98,70,234,0.04);
      --tag-bg:    rgba(98,70,234,0.08);
      --tag-color: var(--violet);
      --tag-border:rgba(98,70,234,0.2);
      --pill-bg:   rgba(13,148,136,0.08);
      --pill-color:var(--teal);
      --pill-border:rgba(13,148,136,0.2);
      --toggle-icon: "🌙";
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.3s;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 68px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.3s, border-color 0.3s;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo span {
      background: linear-gradient(90deg, var(--violet-lt), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right { display: flex; align-items: center; gap: 0.75rem; }

    nav { display: flex; gap: 0.375rem; }
    nav button {
      font-family: 'Inter', sans-serif;
      font-size: 0.825rem;
      font-weight: 500;
      padding: 0.45rem 1.1rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    nav button:hover { color: var(--text); background: var(--surface); }
    nav button.active { background: var(--violet); color: #fff; border-color: var(--violet); }

    /* ── Theme toggle ── */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: var(--violet); box-shadow: 0 0 0 3px var(--tag-bg); }

    /* ── Main ── */
    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
      position: relative;
      z-index: 1;
    }

    .section-header { margin-bottom: 2rem; }
    .section-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .count-badge {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--soft);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
    }
    .section-header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-bar select,
    .filter-bar input {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      padding: 0.55rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      appearance: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.3s;
    }
    .filter-bar input { min-width: 220px; }
    .filter-bar select:focus,
    .filter-bar input:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px var(--tag-bg);
    }
    .filter-bar input::placeholder { color: var(--muted); }

    /* ── Grid ── */
    #events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ── */
    .event-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.3s;
      animation: fadeUp 0.3s ease both;
    }

    [data-theme="light"] .event-card {
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    }

    .event-card:hover {
      transform: translateY(-3px);
      border-color: var(--violet);
      box-shadow: 0 8px 32px rgba(124,92,252,0.15);
    }
    [data-theme="light"] .event-card:hover {
      box-shadow: 0 8px 32px rgba(98,70,234,0.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-card:nth-child(4n+1) { --accent: var(--violet); }
    .event-card:nth-child(4n+2) { --accent: var(--teal);   }
    .event-card:nth-child(4n+3) { --accent: var(--rose);   }
    .event-card:nth-child(4n+4) { --accent: var(--amber);  }

    .card-accent-bar { height: 3px; background: var(--accent); flex-shrink: 0; }

    .card-top {
      padding: 1.1rem 1.25rem 0.75rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .date-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.45rem 0.75rem;
      text-align: center;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    .date-chip .day {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }
    .date-chip .mon {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .type-tag {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 0.25rem 0.65rem;
      border-radius: 6px;
      background: var(--tag-bg);
      color: var(--tag-color);
      border: 1px solid var(--tag-border);
      white-space: nowrap;
      transition: background 0.3s, color 0.3s;
    }

    .card-body {
      padding: 0.5rem 1.25rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .card-body h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.35;
      color: var(--text);
    }
    .card-body p { font-size: 0.82rem; color: var(--muted); line-height: 1.55; font-weight: 300; }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--soft);
      margin-top: 0.25rem;
    }
    .meta-row svg { opacity: 0.6; flex-shrink: 0; }

    .card-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.3s;
    }
    .time-label, .full-date { font-size: 0.75rem; color: var(--muted); }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    [data-theme="light"] .table-wrap {
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface); transition: background 0.3s; }
    thead th {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 1rem 1.25rem;
      text-align: left;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--hover-row); }
    tbody td { padding: 0.9rem 1.25rem; font-size: 0.875rem; color: var(--soft); }
    tbody td strong { color: var(--text); font-weight: 600; }
    .pill {
      display: inline-block;
      padding: 0.22rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--pill-bg);
      color: var(--pill-color);
      border: 1px solid var(--pill-border);
      transition: background 0.3s, color 0.3s;
    }

    /* ── States ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid var(--border);
      border-top-color: var(--violet);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: var(--rose); }

    .tab-view { display: none; }
    .tab-view.active { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">Campus <span>Events</span></div>
  <div class="header-right">
    <nav>
      <button class="active" onclick="switchTab('events', this)">Events</button>
      <button onclick="switchTab('registrations', this)">Registrations</button>
    </nav>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">☀️</button>
  </div>
</header>

<main>

  <div id="tab-events" class="tab-view active">
    <div class="section-header">
      <h2>Upcoming Events <span class="count-badge" id="event-count">—</span></h2>
      <p>Browse and discover everything happening on campus</p>
    </div>
    <div class="filter-bar">
      <select id="type-filter" onchange="renderEvents()">
        <option value="">All event types</option>
      </select>
      <input id="search-input" type="text" placeholder="Search events, locations…" oninput="renderEvents()" />
    </div>
    <div id="events-grid">
      <div class="state-msg"><div class="spinner"></div>Loading events…</div>
    </div>
  </div>

  <div id="tab-registrations" class="tab-view">
    <div class="section-header">
      <h2>Registrations <span class="count-badge" id="reg-count">—</span></h2>
      <p>All student event registrations</p>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Student</th><th>Event</th><th>Date</th><th>Type</th></tr>
        </thead>
        <tbody id="reg-tbody">
          <tr><td colspan="5" class="state-msg"><div class="spinner"></div>Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script>
  const API = 'http://localhost:3000/api';
  let allEvents = [];

  // ── Theme ─────────────────────────────────────────────────────────────────
  const html = document.documentElement;
  const btn  = document.getElementById('theme-btn');

  // Respect system preference on first load
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const initial = saved || (prefersDark ? 'dark' : 'light');
  html.setAttribute('data-theme', initial);
  btn.textContent = initial === 'dark' ? '☀️' : '🌙';

  function toggleTheme() {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    btn.textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', next);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tab, tabBtn) {
    document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    tabBtn.classList.add('active');
    if (tab === 'registrations') loadRegistrations();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function fmtDate(dateStr) {
    if (!dateStr) return { day: '?', mon: '???', full: 'Unknown', time: '' };
    const d = new Date(dateStr);
    return {
      day:  d.toLocaleString('en-US', { day: '2-digit' }),
      mon:  d.toLocaleString('en-US', { month: 'short' }),
      full: d.toLocaleString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' }),
      time: d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit' })
    };
  }

  // ── Events ────────────────────────────────────────────────────────────────
  async function loadEvents() {
    try {
      const [evRes, typeRes] = await Promise.all([
        fetch(`${API}/events`),
        fetch(`${API}/event-types`)
      ]);
      if (!evRes.ok) throw new Error(`${evRes.status} ${evRes.statusText}`);
      allEvents = await evRes.json();
      const types = typeRes.ok ? await typeRes.json() : [];
      const sel = document.getElementById('type-filter');
      types.forEach(t => {
        const o = document.createElement('option');
        o.value = t.type_name; o.textContent = t.type_name;
        sel.appendChild(o);
      });
      renderEvents();
    } catch (err) {
      document.getElementById('events-grid').innerHTML =
        `<div class="state-msg error-msg">⚠️ ${err.message}<br><small style="color:var(--muted)">Is the server running on port 3000?</small></div>`;
    }
  }

  function renderEvents() {
    const typeFilter = document.getElementById('type-filter').value.toLowerCase();
    const search     = document.getElementById('search-input').value.toLowerCase();
    const filtered   = allEvents.filter(ev => {
      const mt = !typeFilter || (ev.type_name||'').toLowerCase() === typeFilter;
      const ms = !search || [ev.title, ev.description, ev.location].some(f => (f||'').toLowerCase().includes(search));
      return mt && ms;
    });

    document.getElementById('event-count').textContent = filtered.length;
    const grid = document.getElementById('events-grid');

    if (!filtered.length) {
      grid.innerHTML = `<div class="state-msg">No events match your filters.</div>`;
      return;
    }

    grid.innerHTML = filtered.map((ev, i) => {
      const d = fmtDate(ev.event_date);
      return `
        <div class="event-card" style="animation-delay:${i * 0.04}s">
          <div class="card-accent-bar"></div>
          <div class="card-top">
            <div class="date-chip">
              <div class="day">${d.day}</div>
              <div class="mon">${d.mon}</div>
            </div>
            <span class="type-tag">${ev.type_name || 'General'}</span>
          </div>
          <div class="card-body">
            <h3>${ev.title || 'Untitled Event'}</h3>
            ${ev.description ? `<p>${ev.description}</p>` : ''}
            ${ev.location ? `
            <div class="meta-row">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${ev.location}
            </div>` : ''}
          </div>
          <div class="card-footer">
            <span class="full-date">${d.full}</span>
            <span class="time-label">${d.time}</span>
          </div>
        </div>`;
    }).join('');
  }

  // ── Registrations ─────────────────────────────────────────────────────────
  async function loadRegistrations() {
    const tbody = document.getElementById('reg-tbody');
    tbody.innerHTML = `<tr><td colspan="5" class="state-msg"><div class="spinner"></div>Loading…</td></tr>`;
    try {
      const res = await fetch(`${API}/registrations`);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      const rows = await res.json();
      document.getElementById('reg-count').textContent = rows.length;
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="state-msg">No registrations yet.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map((r, i) => {
        const d = fmtDate(r.event_date);
        return `<tr>
          <td style="color:var(--border);font-size:.8rem">${i+1}</td>
          <td><strong>${r.first_name} ${r.last_name}</strong><br>
              <small style="color:var(--muted);font-size:.78rem">${r.email||''}</small></td>
          <td><strong>${r.title}</strong></td>
          <td>${d.full}</td>
          <td><span class="pill">${r.type_name}</span></td>
        </tr>`;
      }).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="5" class="state-msg error-msg">⚠️ ${err.message}</td></tr>`;
    }
  }

  loadEvents();
</script>
</body>
</html>
